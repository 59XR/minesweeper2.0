<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>猫咪扫雷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: black;
            position: relative;
            font-family: Arial, sans-serif;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* 添加一个包装容器 */
        .game-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 真实画布（按设计稿等比缩放） */
        .game-stage {
            position: relative;
            width: 390px;
            height: 844px;
            overflow: hidden;
            transform: scale(var(--game-scale, 1));
            transform-origin: center;
        }

        /* 弹窗出现时，只模糊“可点击的格子盘” */
        .game-stage.modal-open #game-container {
            filter: blur(2px) brightness(0.97);
            -webkit-filter: blur(2px) brightness(0.97);
            pointer-events: none;
        }

        /* 踩雷抖动：用“视差”让各元素轻微不同步/不同幅度 */
        @keyframes shake-parallax {
            0%   { transform: translate3d(0, 0, 0); }
            12%  { transform: translate3d(calc(var(--sx, 2px) * -0.55), calc(var(--sy, 1px) * 0.45), 0); }
            24%  { transform: translate3d(calc(var(--sx, 2px) * 0.55), calc(var(--sy, 1px) * -0.45), 0); }
            38%  { transform: translate3d(calc(var(--sx, 2px) * -0.4), calc(var(--sy, 1px) * 0.35), 0); }
            52%  { transform: translate3d(calc(var(--sx, 2px) * 0.35), calc(var(--sy, 1px) * -0.3), 0); }
            70%  { transform: translate3d(calc(var(--sx, 2px) * -0.22), calc(var(--sy, 1px) * 0.18), 0); }
            88%  { transform: translate3d(calc(var(--sx, 2px) * 0.12), calc(var(--sy, 1px) * -0.12), 0); }
            100% { transform: translate3d(0, 0, 0); }
        }

        /* 针对本身依赖 translateX(-50%) 居中的元素，抖动时必须保留它 */
        @keyframes shake-parallax-centered-x50 {
            0%   { transform: translateX(-50%) translate3d(0, 0, 0); }
            12%  { transform: translateX(-50%) translate3d(calc(var(--sx, 2px) * -0.55), calc(var(--sy, 1px) * 0.45), 0); }
            24%  { transform: translateX(-50%) translate3d(calc(var(--sx, 2px) * 0.55), calc(var(--sy, 1px) * -0.45), 0); }
            38%  { transform: translateX(-50%) translate3d(calc(var(--sx, 2px) * -0.4), calc(var(--sy, 1px) * 0.35), 0); }
            52%  { transform: translateX(-50%) translate3d(calc(var(--sx, 2px) * 0.35), calc(var(--sy, 1px) * -0.3), 0); }
            70%  { transform: translateX(-50%) translate3d(calc(var(--sx, 2px) * -0.22), calc(var(--sy, 1px) * 0.18), 0); }
            88%  { transform: translateX(-50%) translate3d(calc(var(--sx, 2px) * 0.12), calc(var(--sy, 1px) * -0.12), 0); }
            100% { transform: translateX(-50%) translate3d(0, 0, 0); }
        }

        .game-stage.shake .game-background,
        .game-stage.shake #game-container,
        .game-stage.shake #win-popup {
            will-change: transform;
            animation-name: shake-parallax;
            animation-fill-mode: both;
            animation-timing-function: ease-in-out;
        }

        .game-stage.shake #start-button,
        .game-stage.shake #game-time {
            will-change: transform;
            animation-name: shake-parallax-centered-x50;
            animation-fill-mode: both;
            animation-timing-function: ease-in-out;
        }

        /* 背景：最轻微 */
        .game-stage.shake .game-background {
            --sx: 1.248px;
            --sy: 0.78px;
            animation-duration: 560ms;
            animation-delay: 0ms;
        }

        /* 棋盘：最明显 */
        .game-stage.shake #game-container {
            --sx: 2.184px;
            --sy: 0.936px;
            animation-duration: 520ms;
            animation-delay: 12ms;
        }

        /* 顶部 UI：中等、略晚一点 */
        .game-stage.shake #start-button {
            --sx: 1.248px;
            --sy: 0.624px;
            animation-duration: 500ms;
            animation-delay: 18ms;
        }

        .game-stage.shake #game-time {
            --sx: 1.092px;
            --sy: 0.546px;
            animation-duration: 540ms;
            animation-delay: 10ms;
        }

        /* 弹窗（如果此时在显示）：很轻微 */
        .game-stage.shake #win-popup {
            --sx: 1.248px;
            --sy: 0.78px;
            animation-duration: 600ms;
            animation-delay: 0ms;
        }

        @media (prefers-reduced-motion: reduce) {
            .game-stage.shake .game-background,
            .game-stage.shake #game-container,
            .game-stage.shake #win-popup {
                animation: none;
            }

            .game-stage.shake #start-button,
            .game-stage.shake #game-time {
                animation: none;
            }
        }

        /* 将背景图移到包装容器中 */
        .game-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./images/background.png');
            background-position: center top;
            background-repeat: no-repeat;
            background-size: 100% 100%;
            z-index: -1;
        }

        #game-container {
            margin-top: 290px;
            margin-left: 15px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 0;
            padding: 2px;
            background: black;
            width: 359.424px;
            height: 449.28px;
        }

        .cell {
            width: 100%;
            height: 100%;
            background-color: #95a5a6;
            background: #95a5a6 url('./images/lattice.png') no-repeat center center;
            background-size: cover;
            border: none;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            touch-action: none; /* 需要 pointermove 追踪下拉手势 */
            box-sizing: border-box;
            transition: transform 80ms ease, filter 80ms ease;
        }

        .cell:active {
            transform: scale(0.98);
            filter: brightness(1.08);
        }

        .cell.revealed:active {
            transform: none;
            filter: none;
        }

        /* 手机端“按住下滑插旗”的拉伸跟手效果 */
        .cell.pulling {
            transition: none;
            transform-origin: 50% 12%;
            transform: scaleY(calc(1 + var(--pull, 0)));
            filter: brightness(1.05);
        }

        @keyframes pull-rebound {
            0% { transform: scaleY(calc(1 + var(--pull, 0))); }
            55% { transform: scaleY(0.965); }
            100% { transform: scaleY(1); }
        }

        .cell.pull-rebound {
            transform-origin: 50% 12%;
            animation: pull-rebound 240ms cubic-bezier(.2,.9,.2,1.2) both;
        }

        .cell.revealed {
            background: #BDC3A7;
            border: 1px solid #979795;
            color: white;
        }

        .cell.revealed.game-over {
            background: #9EA48B;
            border: 1px solid #7A7A78;
        }

        .cell.flagged {
            position: relative;
        }

        .cell.flagged::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 70%;
            height: 70%;
            background: url('./images/cat.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        @keyframes flag-pop {
            0% { transform: scale(1); filter: brightness(1); }
            45% { transform: scale(0.96); filter: brightness(1.08); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        @keyframes flag-icon-pop {
            0% { transform: scale(0.7) rotate(-4deg); opacity: 0.85; }
            60% { transform: scale(1.05) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .cell.flag-feedback {
            animation: flag-pop 220ms ease-out both;
        }

        .cell.flag-feedback::after {
            animation: flag-icon-pop 260ms cubic-bezier(.2,.9,.2,1.2) both;
            transform-origin: 50% 60%;
        }

        .cell.mine {
            /* 地雷格：底层仍是格子/已揭示背景，炸弹用叠加层显示 */
            background: #9EA48B url('./images/boom_bg.png') no-repeat center center;
            background-size: cover;
        }

        /* 确保揭示后的地雷格也使用炸弹背景（覆盖 .cell.revealed） */
        .cell.revealed.mine {
            background: #9EA48B url('./images/boom_bg.png') no-repeat center center;
            background-size: cover;
        }

        /* 踩雷后：地雷以“涟漪”扩散方式依次出现 */
        @keyframes mine-ripple-reveal {
            0% { transform: scale(0.88); filter: brightness(1.35) contrast(1.08); opacity: 0.96; }
            55% { transform: scale(1.06); filter: brightness(1.15) contrast(1.04); opacity: 1; }
            100% { transform: scale(1); filter: brightness(1) contrast(1); opacity: 1; }
        }

        /* 用 ::before 叠加炸弹，避免与 flagged::after 冲突 */
        .cell.mine::before {
            content: '';
            position: absolute;
            top: 8%;
            left: 8%;
            width: 84%;
            height: 84%;
            background: url('./images/boom.png') no-repeat center center;
            background-size: contain;
            z-index: 2;
            pointer-events: none;
            transform: scale(1);
            filter: brightness(1) contrast(1);
            opacity: 1;
        }

        .cell.mine.mine-ripple::before {
            animation: mine-ripple-reveal 280ms ease-in-out both;
        }

        @keyframes mine-hit {
            0% { transform: scale(1); filter: brightness(1) contrast(1); opacity: 1; }
            35% { transform: scale(1.06); filter: brightness(1.22) contrast(1.1); opacity: 1; }
            100% { transform: scale(1); filter: brightness(1) contrast(1); opacity: 1; }
        }

        .cell.mine.mine-feedback::before {
            animation: mine-hit 213ms cubic-bezier(.2,.9,.2,1) both;
        }

        #start-button {
            position: absolute;
            top: 203px;
            left: calc(50% + 9px);
            width: 156px;
            height: 52px;
            background-color: transparent;
            background-image: url('./images/button.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            border: none;
            cursor: pointer;
            transform: translateX(-50%);
            padding: 0;
            appearance: none;
            -webkit-appearance: none;
            transition: transform 90ms ease, filter 90ms ease;
        }

        #start-button:active {
            transform: translateX(-50%) scale(0.98);
            filter: brightness(1.08);
        }

        #win-popup {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 324px;
            height: 240px;
            background: url('./images/ending.png') no-repeat center center;
            background-size: contain;
            z-index: 1000;
        }

        #continue-button {
            position: absolute;
            bottom: 31px;
            left: 50%;
            transform: translateX(-50%);
            width: 108px;
            height: 36px;
            background-color: transparent;
            background-image: url('./images/restart.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: contain;
            border: none;
            cursor: pointer;
            z-index: 1001;
            margin-left: -96px;
            padding: 0;
            appearance: none;
            -webkit-appearance: none;
            transition: transform 90ms ease, filter 90ms ease;
        }

        #continue-button:active {
            transform: translateX(-50%) scale(0.98);
            filter: brightness(1.08);
        }

        @supports (background-image: image-set(url("./images/button.png") 1x)) {
            #start-button {
                background-image: image-set(
                    url('./images/button.png') 1x,
                    url('./images/button@2x.png') 2x,
                    url('./images/button@3x.png') 3x
                );
            }

            #continue-button {
                background-image: image-set(
                    url('./images/restart.png') 1x,
                    url('./images/restart@2x.png') 2x,
                    url('./images/restart@3x.png') 3x
                );
            }
        }

        #mines-left {
            display: none;
        }

        /* 添加数字颜色样式 */
        .cell.revealed[data-number="1"] {
            color: #F15A07;  /* 从 #F07937 改为 #F15A07 */
        }
        .cell.revealed[data-number="2"] {
            color: #3575B5;  /* 蓝色 */
        }
        .cell.revealed[data-number="3"] {
            color: #7AAD45;  /* 绿色 */
        }
        .cell.revealed[data-number="4"] {
            color: #E5401B;  /* 红色 */
        }

        #win-time {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #F14996;
            font-size: 19.38px;
            font-weight: bold;
            text-align: center;
            z-index: 1001;
            margin-left: -98px;
        }

        #game-time {
            position: absolute;
            top: 218px;
            left: calc(50% + 15px);
            transform: translateX(-50%);
            color: #FFFEFD;
            font-size: 24px;
            font-weight: bold;
            margin-left: 138px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-stage">
            <div class="game-background"></div>
            <button id="start-button"></button>
            <div id="game-time">0:00</div>
            <div id="game-container"></div>
            <div id="win-popup">
                <div id="win-time"></div>
                <button id="continue-button"></button>
            </div>
        </div>
    </div>

    <script>
        function clickFeedback() {
            // 某些环境（如 iOS Safari）不支持 vibration，会自动忽略
            if (navigator.vibrate) navigator.vibrate(12);
        }

        function flagFeedback(x, y) {
            // 标记时更轻的反馈
            if (navigator.vibrate) navigator.vibrate(8);
            requestAnimationFrame(() => {
                const el = document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
                if (!el) return;
                el.classList.remove('flag-feedback');
                // 强制 reflow，确保重复触发动画
                void el.offsetWidth;
                el.classList.add('flag-feedback');
                window.setTimeout(() => el.classList.remove('flag-feedback'), 320);
            });
        }

        function mineFeedback() {
            // 踩雷时更明显一点的震动（不支持则忽略）
            if (navigator.vibrate) navigator.vibrate([0, 30, 25, 40]);
            const stage = document.querySelector('.game-stage');
            if (!stage) return;
            stage.classList.remove('shake'); // 允许连续触发
            // 强制 reflow，确保重新加 class 会触发动画
            void stage.offsetWidth;
            stage.classList.add('shake');
            window.setTimeout(() => stage.classList.remove('shake'), 700);
        }

        function mineIconFeedback() {
            // 在 revealAll/renderGrid 之后触发，确保 mine 元素已存在
            requestAnimationFrame(() => {
                const mines = document.querySelectorAll('.cell.mine');
                mines.forEach(el => {
                    el.classList.remove('mine-feedback');
                    void el.offsetWidth;
                    el.classList.add('mine-feedback');
                });
                window.setTimeout(() => {
                    mines.forEach(el => el.classList.remove('mine-feedback'));
                }, 420);
            });
        }

        const DESIGN_WIDTH = 390;
        const DESIGN_HEIGHT = 844;

        function updateGameScale() {
            const vv = window.visualViewport;
            const vw = vv?.width ?? window.innerWidth;
            const vh = vv?.height ?? window.innerHeight;
            // 在不裁切任何元素的前提下，尽可能放大到填满可视区域
            const scale = Math.min(vw / DESIGN_WIDTH, vh / DESIGN_HEIGHT);
            document.documentElement.style.setProperty('--game-scale', String(scale));
        }

        const GRID_SIZE_X = 8;
        const GRID_SIZE_Y = 10;
        const MINES_COUNT = 10;
        let grid = [];
        let revealed = [];
        let flagged = [];
        let gameOver = false;
        let minesLeft = MINES_COUNT;
        let mineHit = null; // {x, y}：踩到的雷坐标（用于涟漪揭雷）
        let mineRippleTimers = [];
        let minesReady = false; // 首次点击后才布雷，保证首点安全

        // 添加计时相关变量
        let startTime;
        let gameTimer;

        let isFirstClick = true;  // 添加标记第一次点击的变量

        function updateGameTime() {
            const currentTime = new Date();
            const timeUsed = currentTime - startTime;
            document.getElementById('game-time').textContent = formatTime(timeUsed);
        }

        function initializeGame() {
            // 移除计时器初始化
            if (gameTimer) {
                clearInterval(gameTimer);
            }
            isFirstClick = true;  // 重置第一次点击标记
            document.getElementById('game-time').textContent = '0:00';
            mineHit = null;
            mineRippleTimers.forEach(t => clearTimeout(t));
            mineRippleTimers = [];
            
            grid = Array(GRID_SIZE_Y).fill().map(() => Array(GRID_SIZE_X).fill(0));
            revealed = Array(GRID_SIZE_Y).fill().map(() => Array(GRID_SIZE_X).fill(false));
            flagged = Array(GRID_SIZE_Y).fill().map(() => Array(GRID_SIZE_X).fill(false));
            gameOver = false;
            minesLeft = MINES_COUNT;
            minesReady = false; // 等首点再布雷并计算数字

            renderGrid();
        }

        function placeMines(excludeX, excludeY) {
            let minesPlaced = 0;
            while (minesPlaced < MINES_COUNT) {
                const x = Math.floor(Math.random() * GRID_SIZE_X);
                const y = Math.floor(Math.random() * GRID_SIZE_Y);
                if (x === excludeX && y === excludeY) continue;
                if (grid[y][x] !== -1) {
                    grid[y][x] = -1;
                    minesPlaced++;
                }
            }
        }

        function computeNumbers() {
            for (let y = 0; y < GRID_SIZE_Y; y++) {
                for (let x = 0; x < GRID_SIZE_X; x++) {
                    if (grid[y][x] !== -1) grid[y][x] = countAdjacentMines(x, y);
                }
            }
        }

        function ensureMinesReady(excludeX, excludeY) {
            if (minesReady) return;
            placeMines(excludeX, excludeY);
            computeNumbers();
            minesReady = true;
        }

        function countAdjacentMines(x, y) {
            let count = 0;
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    const newY = y + dy;
                    const newX = x + dx;
                    if (newY >= 0 && newY < GRID_SIZE_Y && newX >= 0 && newX < GRID_SIZE_X) {
                        if (grid[newY][newX] === -1) count++;
                    }
                }
            }
            return count;
        }

        function renderGrid() {
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            
            for (let y = 0; y < GRID_SIZE_Y; y++) {
                for (let x = 0; x < GRID_SIZE_X; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;

                    if (revealed[y][x]) {
                        cell.classList.add('revealed');
                        if (gameOver) {
                            cell.classList.add('game-over');
                        }
                        if (grid[y][x] === -1) {
                            cell.classList.add('mine');
                        } else if (grid[y][x] > 0) {
                            cell.textContent = grid[y][x];
                            cell.dataset.number = grid[y][x];
                        }
                    } else if (flagged[y][x]) {
                        cell.classList.add('flagged');
                    }

                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleFlag(x, y);
                    });
                    cell.addEventListener('pointerdown', handlePointerDown);
                    cell.addEventListener('pointermove', handlePointerMove);
                    cell.addEventListener('pointerup', handlePointerUp);
                    cell.addEventListener('pointercancel', handlePointerCancel);

                    container.appendChild(cell);
                }
            }
        }

        function revealMineCell(x, y, { animate } = { animate: true }) {
            // 只更新单个格子，避免整盘重渲染导致动画重复触发
            revealed[y][x] = true;
            const el = document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
            if (!el) {
                // 兜底：如果找不到（极少），再整体渲染一次
                renderGrid();
                return;
            }

            el.classList.add('revealed', 'mine');
            if (gameOver) el.classList.add('game-over');
            el.classList.remove('flagged');
            el.textContent = '';
            el.removeAttribute('data-number');

            if (animate) {
                el.classList.remove('mine-ripple');
                void el.offsetWidth;
                el.classList.add('mine-ripple');
                window.setTimeout(() => el.classList.remove('mine-ripple'), 360);
            }
        }

        function revealMinesRipple(fromX, fromY) {
            mineRippleTimers.forEach(t => clearTimeout(t));
            mineRippleTimers = [];

            const mines = [];
            for (let y = 0; y < GRID_SIZE_Y; y++) {
                for (let x = 0; x < GRID_SIZE_X; x++) {
                    if (grid[y][x] === -1) {
                        mines.push({ x, y, dist: Math.hypot(x - fromX, y - fromY) });
                    }
                }
            }

            mines.sort((a, b) => a.dist - b.dist);
            const speed = 55; // ms/格：涟漪速度

            mines.forEach(({ x, y, dist }) => {
                const delay = Math.round(dist * speed);
                const timer = window.setTimeout(() => {
                    // 中心那颗已经先揭示过了，这里跳过
                    if (x === fromX && y === fromY) return;
                    revealMineCell(x, y, { animate: true });
                }, delay);
                mineRippleTimers.push(timer);
            });
        }

        const SWIPE_FLAG_THRESHOLD_PX = 18;
        const SWIPE_MAX_PULL_PX = 34;
        let activePull = null; // { id, x, y, startY, flaggedBySwipe, allowSwipeFlag }

        function clearPullState(el, { rebound } = { rebound: false }) {
            if (!el) return;
            el.classList.remove('pulling');
            el.style.removeProperty('--pull');
            if (rebound) {
                el.classList.remove('pull-rebound');
                void el.offsetWidth;
                el.classList.add('pull-rebound');
                window.setTimeout(() => el.classList.remove('pull-rebound'), 320);
            } else {
                el.classList.remove('pull-rebound');
            }
        }

        function handlePointerDown(e) {
            const cell = e.currentTarget;
            const x = parseInt(cell.dataset.x);
            const y = parseInt(cell.dataset.y);

            // 鼠标：只响应左键“按住下拉插旗”，右键仍用 contextmenu
            if (e.pointerType === 'mouse' && e.button !== 0) return;

            if (gameOver) return;
            // 允许在“已揭示数字”上点按（用于九宫格自动展开），但不允许对它做下拉插旗
            const allowSwipeFlag = !revealed[y][x];
            activePull = { id: e.pointerId, x, y, startY: e.clientY, flaggedBySwipe: false, allowSwipeFlag };
            try { cell.setPointerCapture(e.pointerId); } catch {}
            if (allowSwipeFlag && !flagged[y][x]) {
                cell.classList.add('pulling');
                cell.style.setProperty('--pull', '0');
            }
        }

        function handlePointerMove(e) {
            const cell = e.currentTarget;
            if (!activePull || e.pointerId !== activePull.id) return;
            if (gameOver) return;
            if (!activePull.allowSwipeFlag) return;
            if (revealed[activePull.y][activePull.x]) return;
            if (flagged[activePull.y][activePull.x]) return;

            const dy = e.clientY - activePull.startY;
            const pullPx = Math.max(0, Math.min(SWIPE_MAX_PULL_PX, dy));
            const pull = pullPx / 220; // 0 ~ 0.15 左右
            cell.style.setProperty('--pull', String(pull));

            if (!activePull.flaggedBySwipe && pullPx >= SWIPE_FLAG_THRESHOLD_PX) {
                activePull.flaggedBySwipe = true;
                clearPullState(cell, { rebound: true });
                handleFlag(activePull.x, activePull.y);
            }
        }

        function handlePointerUp(e) {
            const cell = e.currentTarget;
            const x = parseInt(cell.dataset.x);
            const y = parseInt(cell.dataset.y);

            // 统一逻辑：如果已经下拉插旗，就不要再触发点击；否则当作一次点击
            if (activePull && e.pointerId === activePull.id) {
                const didFlag = activePull.flaggedBySwipe;
                const allowSwipeFlag = activePull.allowSwipeFlag;
                activePull = null;
                if (allowSwipeFlag) clearPullState(cell, { rebound: !didFlag });
                if (!didFlag) handleClick(x, y);
                return;
            }

            // 兜底：没有 activePull 时（极少），仍允许鼠标左键点击
            if (e.pointerType === 'mouse' && e.button === 0) handleClick(x, y);
        }

        function handlePointerCancel() {
            // 兜底：取消时清理拉伸状态
            const el = document.querySelector('.cell.pulling');
            if (el) clearPullState(el, { rebound: false });
            activePull = null;
        }

        function handleClick(x, y) {
            if (gameOver || flagged[y][x]) return;
            
            // 第一次点击时开始计时
            if (isFirstClick) {
                isFirstClick = false;
                ensureMinesReady(x, y); // 首点安全：首点后才布雷
                startTime = new Date();
                gameTimer = setInterval(updateGameTime, 1000);
            }

            // 如果点击到地雷
            if (grid[y][x] === -1) {
                gameOver = true;
                mineHit = { x, y };
                if (gameTimer) {
                    clearInterval(gameTimer);  // 点到地雷时停止计时
                }
                // 先显示踩到的那颗雷，再涟漪展开其余地雷
                revealMineCell(x, y, { animate: true });
                revealMinesRipple(x, y);
                mineFeedback();
                return;
            }

            // 如果点击的是已经揭示的格子
            if (revealed[y][x]) {
                let flagCount = 0;
                // 计算周围标记的数量
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const newY = y + dy;
                        const newX = x + dx;
                        if (newY >= 0 && newY < GRID_SIZE_Y && newX >= 0 && newX < GRID_SIZE_X) {
                            if (flagged[newY][newX]) flagCount++;
                        }
                    }
                }
                // 如果标记数量等于格子上的数字，则揭示周围未标记的格子
                if (flagCount === grid[y][x]) {
                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            const newY = y + dy;
                            const newX = x + dx;
                            if (newY >= 0 && newY < GRID_SIZE_Y && newX >= 0 && newX < GRID_SIZE_X) {
                                if (!flagged[newY][newX] && !revealed[newY][newX]) {
                                    if (grid[newY][newX] === -1) {
                                        gameOver = true;
                                        mineHit = { x: newX, y: newY };
                                        if (gameTimer) {
                                            clearInterval(gameTimer);  // 点到地雷时停止计时
                                        }
                                        revealMineCell(newX, newY, { animate: true });
                                        revealMinesRipple(newX, newY);
                                        mineFeedback();
                                        return;
                                    }
                                    revealArea(newX, newY);
                                }
                            }
                        }
                    }
                }
            } else {
                // 如果是未揭示的格子，常揭示
                revealArea(x, y);
            }
            renderGrid();
            checkWin();
        }

        function handleFlag(x, y) {
            if (gameOver || revealed[y][x]) return;

            flagged[y][x] = !flagged[y][x];
            minesLeft += flagged[y][x] ? -1 : 1;
            renderGrid();
            flagFeedback(x, y);
            checkWin();
        }

        function countAdjacentFlags(x, y) {
            let count = 0;
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    const ny = y + dy;
                    const nx = x + dx;
                    if (ny >= 0 && ny < GRID_SIZE_Y && nx >= 0 && nx < GRID_SIZE_X) {
                        if (flagged[ny][nx]) count++;
                    }
                }
            }
            return count;
        }

        function revealArea(startX, startY) {
            if (startX < 0 || startX >= GRID_SIZE_X || startY < 0 || startY >= GRID_SIZE_Y) return;
            if (revealed[startY][startX] || flagged[startY][startX]) return;

            const stack = [{ x: startX, y: startY }];
            while (stack.length) {
                const { x, y } = stack.pop();
                if (x < 0 || x >= GRID_SIZE_X || y < 0 || y >= GRID_SIZE_Y) continue;
                if (revealed[y][x] || flagged[y][x]) continue;
                revealed[y][x] = true;

                if (grid[y][x] === 0) {
                    // 只有当周围没有标记时才展开
                    if (countAdjacentFlags(x, y) === 0) {
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                if (dx === 0 && dy === 0) continue;
                                stack.push({ x: x + dx, y: y + dy });
                            }
                        }
                    }
                }
            }
        }

        function revealAll() {
            for (let y = 0; y < GRID_SIZE_Y; y++) {
                for (let x = 0; x < GRID_SIZE_X; x++) {
                    // 如果是炸弹或已经揭示的格子，就显示出来
                    if (grid[y][x] === -1 || revealed[y][x]) {
                        revealed[y][x] = true;
                    }
                }
            }
            if (gameTimer) {
                clearInterval(gameTimer);  // 游戏结束时停止计时
            }
            renderGrid();
        }

        function formatTime(milliseconds) {
            const seconds = Math.floor(milliseconds / 1000);
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }

        function checkWin() {
            let win = true;
            let unrevealedCount = 0;
            let unrevealedMineCount = 0;

            // 计算未揭示的格子数量和未揭示的炸弹数量
            for (let y = 0; y < GRID_SIZE_Y; y++) {
                for (let x = 0; x < GRID_SIZE_X; x++) {
                    if (!revealed[y][x] && !flagged[y][x]) {
                        unrevealedCount++;
                        if (grid[y][x] === -1) {
                            unrevealedMineCount++;
                        }
                    }
                    // 原有的胜利条件检查
                    if (grid[y][x] !== -1 && !revealed[y][x]) win = false;
                    if (grid[y][x] === -1 && !flagged[y][x]) win = false;
                }
            }

            // 如果只剩下一个未揭示的格子，且它是炸弹，直接胜利
            if (unrevealedCount === unrevealedMineCount && unrevealedCount > 0) {
                win = true;
                // 自动标记剩余的弹
                for (let y = 0; y < GRID_SIZE_Y; y++) {
                    for (let x = 0; x < GRID_SIZE_X; x++) {
                        if (!revealed[y][x] && !flagged[y][x] && grid[y][x] === -1) {
                            flagged[y][x] = true;
                        }
                    }
                }
                renderGrid();
            }

            if (win) {
                gameOver = true;
                if (gameTimer) {
                    clearInterval(gameTimer);  // 胜利时停止计时
                }
                const endTime = new Date();
                const timeUsed = endTime - startTime;
                document.getElementById('win-time').textContent = `用时：${formatTime(timeUsed)}`;
                document.querySelector('.game-stage')?.classList.add('modal-open');
                document.getElementById('win-popup').style.display = 'block';
            }
        }

        document.getElementById('start-button').addEventListener('click', () => {
            clickFeedback();
            document.getElementById('game-time').textContent = '0:00';  // 重置游戏时间显示
            initializeGame();
        });
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // 修改继续按钮的点击事件
        document.getElementById('continue-button').addEventListener('click', () => {
            clickFeedback();
            document.getElementById('win-popup').style.display = 'none';
            document.querySelector('.game-stage')?.classList.remove('modal-open');
            document.getElementById('win-time').textContent = '';
            document.getElementById('game-time').textContent = '0:00';  // 重置游戏时间显示
            initializeGame();
        });

        // 在初始化游戏之前添加预加载函数
        function preloadImages() {
            const images = [
                './images/background.png',
                './images/lattice.png',
                './images/cat.png',
                './images/boom.png',
                './images/boom_bg.png',
                './images/button.png',
                './images/ending.png',
                './images/restart.png'
            ];

            images.forEach(src => {
                const img = new Image();
                img.src = src;
                img.onerror = () => {
                    console.error('Failed to load image:', src);
                };
            });
        }

        // 在页面加载完成后执行预加载
        window.addEventListener('load', () => {
            updateGameScale();
            preloadImages();
            initializeGame();
        });

        window.addEventListener('resize', updateGameScale);
        window.addEventListener('orientationchange', updateGameScale);

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', updateGameScale);
            window.visualViewport.addEventListener('scroll', updateGameScale);
        }
    </script>
</body>
</html>
